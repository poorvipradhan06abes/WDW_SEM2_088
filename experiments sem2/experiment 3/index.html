<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 3: DOM Manipulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2 id="main-heading">Welcome to JavaScript Lab</h2>
        <input type="text" id="user-input" placeholder="Enter new heading text">
        <div class="button-group">
            <button id="btn-change-text">Change Heading</button>
            <button id="btn-bg">Change Background</button>
            <button id="btn-font">Increase Font Size</button>
            <br>
            <button id="btn-toggle">Show/Hide Paragraph</button>
            <button id="btn-reset">Reset</button>
        </div>

        <p id="description-text">This is a sample paragraph. JavaScript events can dynamically change content.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
